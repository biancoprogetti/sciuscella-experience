        var lh = Math.round(mid * LINE_HEIGHT_MUL);
        var ls = wrapText(measCtx, text, pageW);
        var of = false;
        for (var k = 0; k < ls.length; k++) if (measCtx.measureText(ls[k]).width > pageW) { of = true; break; }
        if (!of && ls.length * lh <= pageMaxTextH) { best = mid; low = mid + 1; } else high = mid - 1;
      }
      var fs = best;
      measCtx.font = fs + 'px ' + ff;
      var lines = wrapText(measCtx, text, pageW);
      var n = lines.length;
      var lineHeight = Math.round(fs * LINE_HEIGHT_MUL);
      var padX = Math.round(fs * 0.4), padY = Math.round(fs * 0.22);
      var topInset = Math.round((lineHeight - fs) / 2);
      var textColor = textColorFor(boxColor);

      // larghezza di ogni riga → sfondo "a gradini" per riga, allineato a sinistra
      var lineW = [], maxLineW = 0, i;
      for (i = 0; i < n; i++) { lineW[i] = measCtx.measureText(lines[i]).width; if (lineW[i] > maxLineW) maxLineW = lineW[i]; }
      function bgW(i) { return Math.ceil(lineW[i]) + padX * 2; }

      var bufW = Math.ceil(maxLineW) + padX * 2;
      var bufH = n * lineHeight + padY * 2;

      var buf = document.createElement('canvas');
      buf.width = bufW; buf.height = bufH;
      var bc = buf.getContext('2d');
      bc.fillStyle = boxColor;
      for (i = 0; i < n; i++) {
        var yTop = (i === 0) ? 0 : padY + i * lineHeight;
        var yBot = (i === n - 1) ? bufH : padY + (i + 1) * lineHeight;
        bc.fillRect(0, yTop, bgW(i), yBot - yTop);
      }
      bc.fillStyle = textColor;
      bc.textBaseline = 'top';
      bc.font = fs + 'px ' + ff;
      for (i = 0; i < n; i++) bc.fillText(lines[i], padX, padY + i * lineHeight + topInset);

      return { buf: buf, bufW: bufW, bufH: bufH };
    }

    function drawPosterBlock(c, spec) {
      var pad = spec.rw * 0.05;
      var pageW = Math.max(200, Math.round(spec.rw - pad * 2));
      var pageMaxTextH = Math.max(140, Math.round(spec.rh * 0.78));
      var pb = buildPosterBuffer(spec.phrase, spec.color, spec.font, pageW, pageMaxTextH);
      var bufW = pb.bufW, bufH = pb.bufH, halfH = bufH / 2;
      var theta = Math.max(1e-3, spec.bend * THETA_MAX);
      var R = bufH / theta;
      function warp(bx, by) { var phi = (by - halfH) / R, rad = R + bx; return { x: rad * Math.cos(phi) - R, y: rad * Math.sin(phi) }; }

      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, i, p, SAMP = 14;
      for (i = 0; i <= SAMP; i++) {
        var by = bufH * i / SAMP;
        p = warp(0, by);    if (p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
        p = warp(bufW, by); if (p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
      }
      for (i = 0; i <= SAMP; i++) {
        var bx = bufW * i / SAMP;
        p = warp(bx, 0);    if (p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
        p = warp(bx, bufH); if (p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
      }
      var bboxW = maxX - minX, bboxH = maxY - minY;
      var scale = Math.min(spec.rw / bboxW, spec.rh / bboxH);
      if (!isFinite(scale) || scale <= 0) scale = 1;
      var TX = spec.cx - scale * (minX + maxX) / 2;
      var TY = spec.cy - scale * (minY + maxY) / 2;

      var NV = Math.max(6, Math.min(48, Math.round(theta * 18) + 6));
      var OVER = 0.8, bw = bufW, b;
      for (b = 0; b < NV; b++) {
        var ys = bufH * b / NV, ye = bufH * (b + 1) / NV, yeOv = Math.min(bufH, ye + OVER);
        var D0 = warp(0, ys), D1 = warp(bw, ys), D2 = warp(0, yeOv), D3 = warp(bw, yeOv);
        var a = (D1.x - D0.x) / bw, bb = (D1.y - D0.y) / bw;
        var cc = (D2.x - D0.x) / (yeOv - ys), dd = (D2.y - D0.y) / (yeOv - ys);
        var e = D0.x - cc * ys, f = D0.y - dd * ys;
        var S0x = scale*D0.x+TX, S0y = scale*D0.y+TY, S1x = scale*D1.x+TX, S1y = scale*D1.y+TY;
        var S3x = scale*D3.x+TX, S3y = scale*D3.y+TY, S2x = scale*D2.x+TX, S2y = scale*D2.y+TY;
        c.save();
        c.beginPath();
        c.moveTo(S0x, S0y); c.lineTo(S1x, S1y); c.lineTo(S3x, S3y); c.lineTo(S2x, S2y);
        c.closePath(); c.clip();
        c.setTransform(scale*a, scale*bb, scale*cc, scale*dd, scale*e+TX, scale*f+TY);
        c.drawImage(pb.buf, 0, 0);
        c.restore();
      }
      c.setTransform(1, 0, 0, 1, 0, 0);
    }

    function exportA4() {
      var DPI = 300;
      var A4W = Math.round(210 / 25.4 * DPI);  // 2480 px (A4 verticale)
      var A4H = Math.round(297 / 25.4 * DPI);  // 3508 px
      var cv = document.createElement('canvas');
      cv.width = A4W; cv.height = A4H;
      var c = cv.getContext('2d');           // sfondo trasparente: niente fill

      var N = 4 + Math.floor(Math.random() * 2); // 4 o 5 frasi
      var cols = shuffle(COLORS.slice());
      var fnts = shuffle(FONTS.slice());
      var phrs = shuffle(PHRASES.slice());

      // Posizionamento LIBERO in 2D: niente bande/colonne. I centri sono sparsi
      // con "best candidate" (per non ammucchiarli tutti in un punto) ma possono
      // cadere ovunque, anche sui bordi → blocchi grandi che si accavallano e
      // vengono tagliati a vivo (metà dentro / metà fuori dall'immagine).
      var centers = [];
      for (var i = 0; i < N; i++) {
        var rw = randRange(0.5, 0.85) * A4W;
        var rh = randRange(0.32, 0.58) * A4H;

        var best = null, bestD = -1;
        for (var t = 0; t < 12; t++) {
          var ccx = randRange(0, A4W), ccy = randRange(0, A4H);
          var dmin = 1e18;
          for (var j = 0; j < centers.length; j++) {
            var dx = ccx - centers[j].x, dy = ccy - centers[j].y;
            var dd = dx * dx + dy * dy;
            if (dd < dmin) dmin = dd;
          }
          if (dmin > bestD) { bestD = dmin; best = { x: ccx, y: ccy }; }
        }
        centers.push(best);

        var bend = Math.random() < 0.45 ? 0 : randRange(0.25, BEND_MAX); // miste: alcune piatte, altre aperte
        drawPosterBlock(c, {
          phrase: phrs[i % phrs.length],
          color: cols[i % cols.length],
          font: fnts[i % fnts.length],
          rw: rw, rh: rh, cx: best.x, cy: best.y, bend: bend
        });
      }

      cv.toBlob(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'prova2-A4-' + new Date().toISOString().replace(/[:.]/g, '-') + '.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      }, 'image/png');
    }

    // ── Diagnostic blob visualizer ───────────────────────────────────────
    // Colori per ID massa (ciclici)
    var PERSON_COLORS = ['#00e5ff','#ff2d8f','#ffe600','#0bff6a','#ff6b35','#a78bfa','#ff5252','#26d9ff'];

    var diagBox     = document.getElementById('hands-diag');
    var diagCanvas  = document.getElementById('diagCanvas');
    var diagCtx     = diagCanvas.getContext('2d');
    var diagStats   = document.getElementById('diagStats');
    var diagVisible = false;

    // Canvas piccolo per upscalare la maschera diff (rossa) sul diag
    var maskCanvas = document.createElement('canvas');
    maskCanvas.width = PROC_W; maskCanvas.height = PROC_H;
    var maskCtx = maskCanvas.getContext('2d');
    var maskImgData = maskCtx.createImageData(PROC_W, PROC_H);

    function setDiag(visible) {
      diagVisible = !!visible;
      diagBox.hidden = !diagVisible;
    }

    function colorForId(id) {
      var n = parseInt(id, 10) || 0;
      return PERSON_COLORS[(n - 1 + PERSON_COLORS.length) % PERSON_COLORS.length];
    }

    function drawDiagnostic(detections) {
      if (!diagVisible) return;
      if (!video || video.readyState < 2) return;

      var dW = diagCanvas.width, dH = diagCanvas.height;

      // 1) feed webcam (mirror coerente col processing)
      diagCtx.save();
      if (MIRROR_VIDEO) {
        diagCtx.scale(-1, 1);
        diagCtx.drawImage(video, -dW, 0, dW, dH);
      } else {
        diagCtx.drawImage(video, 0, 0, dW, dH);
      }
      diagCtx.restore();

      // velo scuro per leggibilità
      diagCtx.fillStyle = 'rgba(0,0,0,0.45)';
      diagCtx.fillRect(0, 0, dW, dH);

      // 2) maschera differenza in rosso (quello che il sistema "vede" muoversi)
      var md = maskImgData.data;
      for (var m = 0, p = 0; m < diffMask.length; m++, p += 4) {
        if (diffMask[m] === 1) {
          md[p] = 255; md[p + 1] = 40; md[p + 2] = 40; md[p + 3] = 110;
        } else {
          md[p + 3] = 0;
        }
      }
      maskCtx.putImageData(maskImgData, 0, 0);
      diagCtx.imageSmoothingEnabled = false;
      diagCtx.drawImage(maskCanvas, 0, 0, dW, dH);

      // 2b) contorno area attiva (sempre visibile): fuori = ignorato
      if (!calibMode) {
        diagCtx.strokeStyle = 'rgba(0,229,255,0.7)';
        diagCtx.lineWidth = 1.5;
        diagCtx.setLineDash([6, 4]);
        diagCtx.beginPath();
        diagCtx.moveTo(calibPts[0].x * dW, calibPts[0].y * dH);
        for (var qq = 1; qq < 4; qq++) diagCtx.lineTo(calibPts[qq].x * dW, calibPts[qq].y * dH);
        diagCtx.closePath();
        diagCtx.stroke();
        diagCtx.setLineDash([]);
      }

      // 3) per ogni massa: cerchio di ingombro + centroide + ID
      // (id null = candidata non confermata → grigio tratteggiato, niente label)
      var sx = dW / W, sy = dH / H;
      var sAvg = (sx + sy) / 2;
      for (var i = 0; i < detections.length; i++) {
        var d = detections[i];
        var ccx = d.x * sx, ccy = d.y * sy;
        var rr  = d.r * sAvg;

        if (d.id == null) {
          diagCtx.strokeStyle = 'rgba(255,255,255,0.35)';
          diagCtx.lineWidth = 1;
          diagCtx.setLineDash([4, 4]);
          diagCtx.beginPath();
          diagCtx.arc(ccx, ccy, rr, 0, Math.PI * 2);
          diagCtx.stroke();
          diagCtx.setLineDash([]);
          continue;
        }

        var color = colorForId(d.id);

        // cerchio di ingombro
        diagCtx.strokeStyle = color;
        diagCtx.lineWidth = 1.6;
        diagCtx.globalAlpha = 0.9;
        diagCtx.beginPath();
        diagCtx.arc(ccx, ccy, rr, 0, Math.PI * 2);
        diagCtx.stroke();
        diagCtx.fillStyle = color;
        diagCtx.globalAlpha = 0.10;
        diagCtx.beginPath();
        diagCtx.arc(ccx, ccy, rr, 0, Math.PI * 2);
        diagCtx.fill();
        diagCtx.globalAlpha = 1;

        // centroide
        diagCtx.fillStyle = '#fff';
        diagCtx.beginPath();
        diagCtx.arc(ccx, ccy, 4, 0, Math.PI * 2);
        diagCtx.fill();

        // etichetta: ID + % di frame occupata
        var text = 'P' + d.id + ' · ' + (d.score * 100).toFixed(1) + '%';
        diagCtx.font = '11px "Helvetica Neue", Helvetica, Arial, sans-serif';
        var tw = diagCtx.measureText(text).width;
        var tx = Math.max(2, Math.min(dW - tw - 6, ccx - tw / 2));
        var ty = Math.max(12, ccy - rr - 6);
        diagCtx.fillStyle = color;
        diagCtx.fillRect(tx - 2, ty - 10, tw + 6, 13);
        diagCtx.fillStyle = '#000';
        diagCtx.font = 'bold 11px "Helvetica Neue", Helvetica, Arial, sans-serif';
        diagCtx.fillText(text, tx + 1, ty);
      }

      // 4) banner se lo sfondo non è ancora calibrato
      // 3b) tracce in PREDIZIONE (occluse/fuse): cerchio a puntini col loro ID
      // alla posizione prevista → si vede l'identità "sopravvivere" all'incrocio
      var occluded = 0;
      for (var pk in trackedPersons) {
        var tp = trackedPersons[pk];
        if (!tp.missed || tp.missed < 1) continue;   // solo le non viste questo frame
        occluded++;
        var color2 = colorForId(pk);
        var ox = tp.x * sx, oy = tp.y * sy, orr = (tp.r || 60) * sAvg;
        diagCtx.strokeStyle = color2;
        diagCtx.globalAlpha = 0.6;
        diagCtx.lineWidth = 1.4;
        diagCtx.setLineDash([3, 3]);
        diagCtx.beginPath();
        diagCtx.arc(ox, oy, orr, 0, Math.PI * 2);
        diagCtx.stroke();
        diagCtx.setLineDash([]);
        diagCtx.globalAlpha = 1;
        diagCtx.fillStyle = color2;
        diagCtx.font = 'bold 10px "Helvetica Neue", Helvetica, Arial, sans-serif';
        diagCtx.fillText('P' + pk + ' ?', ox - 10, oy - orr - 4);
      }

      if (!bgReady) {
        diagCtx.fillStyle = 'rgba(0,0,0,0.7)';
        diagCtx.fillRect(0, dH / 2 - 12, dW, 24);
        diagCtx.fillStyle = '#ffe600';
        diagCtx.font = 'bold 11px "Helvetica Neue", Helvetica, Arial, sans-serif';
        diagCtx.textAlign = 'center';
        diagCtx.fillText('SFONDO NON CALIBRATO — premi 🎯 Sfondo', dW / 2, dH / 2 + 4);
        diagCtx.textAlign = 'left';
      }

      // Calibrazione area: quad con 4 maniglie trascinabili sull'immagine camera
      if (calibMode) {
        var hx = calibPts.map(function (p) { return p.x * dW; });
        var hy = calibPts.map(function (p) { return p.y * dH; });
        // quad
        diagCtx.strokeStyle = '#ff0066';
        diagCtx.lineWidth = 2;
        diagCtx.beginPath();
        diagCtx.moveTo(hx[0], hy[0]);
        for (var q = 1; q < 4; q++) diagCtx.lineTo(hx[q], hy[q]);
        diagCtx.closePath();
        diagCtx.stroke();
        // velo dentro il quad
        diagCtx.fillStyle = 'rgba(255,0,102,0.12)';
        diagCtx.fill();
        // maniglie numerate
        for (var ci = 0; ci < 4; ci++) {
          diagCtx.fillStyle = (calibDrag === ci) ? '#fff' : '#ff0066';
          diagCtx.beginPath(); diagCtx.arc(hx[ci], hy[ci], 9, 0, Math.PI * 2); diagCtx.fill();
          diagCtx.strokeStyle = '#fff'; diagCtx.lineWidth = 2;
          diagCtx.beginPath(); diagCtx.arc(hx[ci], hy[ci], 9, 0, Math.PI * 2); diagCtx.stroke();
          diagCtx.fillStyle = (calibDrag === ci) ? '#ff0066' : '#fff';
          diagCtx.font = 'bold 11px Helvetica, Arial, sans-serif';
          diagCtx.textAlign = 'center'; diagCtx.textBaseline = 'middle';
          diagCtx.fillText(String(ci + 1), hx[ci], hy[ci]);
        }
        diagCtx.textBaseline = 'alphabetic';
        // istruzione
        diagCtx.fillStyle = 'rgba(0,0,0,0.55)';
        diagCtx.fillRect(0, 0, dW, 20);
        diagCtx.fillStyle = '#ff66a3';
        diagCtx.font = 'bold 11px "Helvetica Neue", Helvetica, Arial, sans-serif';
        diagCtx.textAlign = 'left';
        diagCtx.fillText('TRASCINA la maniglia N sul numero N proiettato · G per uscire', 6, 14);
      }

      diagStats.textContent = detections.length + ' masse · ' +
        (occluded > 0 ? occluded + ' occluse · ' : '') + detectFps + ' fps';
    }

    // ── Calibrazione area: trascina i 4 angoli sul feed camera ────────────
    function enterCalibGeo() {
      calibMode = true;
      netState.calib = 1; netPost();   // la proiezione mostra i numeri 1..4
      setDiag(true);
      document.getElementById('btnCalibGeo').classList.add('on');
    }
    function exitCalibGeo() {
      calibMode = false;
      calibDrag = -1;
      saveCalib();
      netState.calib = 0; netPost();
      document.getElementById('btnCalibGeo').classList.remove('on');
    }
    function resetCalibCorners() {
      calibPts = [{x:0.10,y:0.10},{x:0.90,y:0.10},{x:0.90,y:0.90},{x:0.10,y:0.90}];
      rebuildHom();
      if (!calibMode) enterCalibGeo();   // entra in calibrazione così li vedi
    }
    document.getElementById('btnCalibGeo').addEventListener('click', function () {
      if (calibMode) exitCalibGeo(); else enterCalibGeo();
    });
    document.getElementById('btnCalibReset').addEventListener('click', resetCalibCorners);

    function diagEventNorm(e) {
      var rect = diagCanvas.getBoundingClientRect();
      var cx = (e.touches ? e.touches[0].clientX : e.clientX);
      var cy = (e.touches ? e.touches[0].clientY : e.clientY);
      return { x: (cx - rect.left) / rect.width, y: (cy - rect.top) / rect.height };
    }
    function diagDown(e) {
      if (!calibMode) return;
      var p = diagEventNorm(e);
      // trova la maniglia più vicina entro una soglia
      var best = -1, bestD = 0.05 * 0.05; // raggio di presa (normalizzato)
      for (var i = 0; i < 4; i++) {
        var dx = calibPts[i].x - p.x, dy = calibPts[i].y - p.y;
        var d = dx * dx + dy * dy;
        if (d < bestD) { bestD = d; best = i; }
      }
      calibDrag = best;
      if (best >= 0) e.preventDefault();
    }
    function diagMove(e) {
      if (!calibMode || calibDrag < 0) return;
      var p = diagEventNorm(e);
      calibPts[calibDrag].x = Math.max(0, Math.min(1, p.x));
      calibPts[calibDrag].y = Math.max(0, Math.min(1, p.y));
      rebuildHom();              // anteprima dal vivo
      e.preventDefault();
    }
    function diagUp() {
      if (calibDrag >= 0) { calibDrag = -1; saveCalib(); }
    }
    diagCanvas.addEventListener('mousedown', diagDown);
    window.addEventListener('mousemove', diagMove);
    window.addEventListener('mouseup', diagUp);
    diagCanvas.addEventListener('touchstart', diagDown, { passive: false });
    window.addEventListener('touchmove', diagMove, { passive: false });
    window.addEventListener('touchend', diagUp);

    document.getElementById('btnDiag').addEventListener('click', function () { setDiag(!diagVisible); });

    // Cambio camera disponibile via tasto V (bottone rimosso dall'UI).
    // Utile per scegliere la camera dall'alto (es. telefono via Iriun).
    async function cycleCamera() {
      try {
        await listVideoDevices();
        await useCamera(currentCamIdx + 1);
        setTimeout(function () { calibrateBackground(); }, 1000);
      } catch (e) { console.error('[cycleCamera]', e); }
    }

    // Mirror toggle — cambia geometria del confronto: ricalibra lo sfondo
    var btnMirror = document.getElementById('btnMirror');
    btnMirror.classList.toggle('on', MIRROR_VIDEO);
    btnMirror.addEventListener('click', function () {
      MIRROR_VIDEO = !MIRROR_VIDEO;
      btnMirror.classList.toggle('on', MIRROR_VIDEO);
      calibrateBackground();
    });

    // Calibrazione sfondo manuale
    document.getElementById('btnCalibrate').addEventListener('click', function () {
      calibrateBackground();
    });

    // Apri finestra di proiezione pulita su questo Mac (solo test same-device,
    // via tasto P). In mostra il proiettore apre proj.html da solo.
    var projWin = null;
    function openProjection() {
      if (projWin && !projWin.closed) { projWin.focus(); return; }
      projWin = window.open(location.pathname + '?proj=1', 'sciuscella_proj',
        'width=1280,height=800');
    }

    // Slider sensibilità (soglia di differenza)
    var sensSlider = document.getElementById('sensSlider');
    var sensValue  = document.getElementById('sensValue');
    sensSlider.value = DIFF_THRESHOLD;
    sensValue.textContent = DIFF_THRESHOLD;
    sensSlider.addEventListener('input', function () {
      DIFF_THRESHOLD = +sensSlider.value;
      sensValue.textContent = DIFF_THRESHOLD;
    });
    document.getElementById('diagClose').addEventListener('click', function () { setDiag(false); });

    document.getElementById('btnSaveAll').addEventListener('click', function () { exportSvgFor('all'); });
    document.getElementById('btnClear').addEventListener('click', clearPath);
    document.getElementById('btnReveal').addEventListener('click', revealAll);
    document.getElementById('btnA4').addEventListener('click', exportA4);
    document.addEventListener('keydown', function (e) {
      if (e.key === 's' || e.key === 'S') exportSvgFor('all');
      if (e.key === 'c' || e.key === 'C') clearPath();
      if (e.key === 'r' || e.key === 'R') revealAll();
      if (e.key === 'a' || e.key === 'A') exportA4();
      if (e.key === 'd' || e.key === 'D') setDiag(!diagVisible);
      if (e.key === 'b' || e.key === 'B') calibrateBackground();
      if (e.key === 'p' || e.key === 'P') openProjection();
      if (e.key === 'v' || e.key === 'V') cycleCamera();
      if (e.key === 'g' || e.key === 'G') { if (calibMode) exitCalibGeo(); else enterCalibGeo(); }
      if (e.key === 'k' || e.key === 'K') resetCalibCorners();
    });

    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
